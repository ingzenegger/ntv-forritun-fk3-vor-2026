name: CI
 
on:
  push:
    branches: [main]
  pull_request:

env:
  PROJECT: "Inga_lausnir/lesson8"
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: $PROJECT/package-lock.json
      - run: npm ci
        working-directory: Inga_lausnir/lesson8
      - run: npm run lint
        working-directory: Inga_lausnir/lesson8
      - run: npm run test
        working-directory: Inga_lausnir/lesson8
